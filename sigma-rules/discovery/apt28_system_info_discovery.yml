title: APT28 System Information Discovery
id: f6a7b8c9-d0e1-2345-fabc-678901234567
status: experimental
description: Detects rapid system enumeration commands commonly run by APT28 after initial access to profile the target environment.
references:
  - https://attack.mitre.org/techniques/T1082/
  - https://attack.mitre.org/techniques/T1016/
  - https://attack.mitre.org/groups/G0007/
author: Abhishek S
date: 2026-06-29
tags:
  - attack.t1082
  - attack.t1016
  - attack.g0007
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\systeminfo.exe'
      - '\ipconfig.exe'
      - '\nltest.exe'
      - '\whoami.exe'
  selection_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  condition: selection_image and selection_parent
falsepositives:
  - Legitimate admin scripts running multiple discovery commands
  - IT inventory tools
level: medium
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
