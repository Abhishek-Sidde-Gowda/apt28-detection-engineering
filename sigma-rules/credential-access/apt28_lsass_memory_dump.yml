title: APT28 LSASS Memory Access for Credential Dumping
id: b2c3d4e5-f6a7-8901-bcde-f23456789012
status: experimental
description: Detects access to LSASS process memory, used by APT28 to dump credentials with tools like Mimikatz or custom tooling.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://attack.mitre.org/groups/G0007/
author: Abhishek S
date: 2026-06-29
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.g0007
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x147a'
      - '0x143a'
  filter_legitimate:
    SourceImage|endswith:
      - '\MsMpEng.exe'
      - '\WerFault.exe'
      - '\taskmgr.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - AV/EDR products accessing LSASS for monitoring
  - Windows Error Reporting
level: high
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - CallTrace
