title: APT28 Registry Run Key Persistence
id: c3d4e5f6-a7b8-9012-cdef-345678901234
status: experimental
description: Detects modifications to common registry run keys used by APT28 for persistence across reboots.
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://attack.mitre.org/groups/G0007/
author: Abhishek S
date: 2026-06-29
tags:
  - attack.persistence
  - attack.t1547.001
  - attack.g0007
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce'
      - '\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run'
  filter_legitimate:
    Image|endswith:
      - '\msiexec.exe'
      - '\setup.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - Software installers adding legitimate autostart entries
level: medium
fields:
  - TargetObject
  - Details
  - Image
  - User
