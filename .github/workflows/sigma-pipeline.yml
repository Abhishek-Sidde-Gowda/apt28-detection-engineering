name: Sigma Detection Pipeline

on:
  push:
    paths:
      - 'sigma-rules/**'
  pull_request:
    paths:
      - 'sigma-rules/**'

jobs:
  lint-and-convert:
    name: Lint and Convert Sigma Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sigma-cli and Sentinel backend
        run: |
          pip install sigma-cli
          pip install pySigma-backend-microsoft365defender
          sigma plugin install microsoft365defender 2>/dev/null || true
          sigma plugin install sentinel 2>/dev/null || true

      - name: Lint Sigma rules (validate YAML and schema)
        run: |
          find sigma-rules/ -name "*.yml" | while read rule; do
            echo "Linting: $rule"
            sigma check "$rule" || exit 1
          done

      - name: List available sigma backends
        run: sigma plugin list --plugin-type backend

      - name: Convert Sigma rules to Sentinel KQL
        run: |
          mkdir -p converted/sentinel-kql
          find sigma-rules/ -name "*.yml" | while read rule; do
            relative_path="${rule#sigma-rules/}"
            output_dir="converted/sentinel-kql/$(dirname "$relative_path")"
            mkdir -p "$output_dir"
            output_file="$output_dir/$(basename "${rule%.yml}.kql")"
            echo "Converting: $rule → $output_file"
            sigma convert -t microsoft_xdr "$rule" > "$output_file" || exit 1
          done

      - name: Commit converted KQL files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add converted/
          git diff --staged --quiet || git commit -m "ci: auto-convert Sigma rules to KQL [skip ci]"
          git push

      - name: Upload converted rules as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-kql-rules
          path: converted/sentinel-kql/
